# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: "en-US"
early_access: false

reviews:
  profile: "chill"
  high_level_summary: true
  review_status: true
  review_details: true
  request_changes_workflow: false

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - ".*"

chat:
  auto_reply: true